<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="7" fill="#1A1916"/>
  <!-- Compass housing — faint circle drawn with a marker -->
  <circle cx="16" cy="16" r="11" stroke="#D4845A" strokeWidth="2" opacity="0.35"/>
  <!-- N needle — two angled strokes meeting at the tip, fat marker style -->
  <path d="M12 17 L16 5 L20 17"
        stroke="#D4845A" strokeWidth="3.2"
        strokeLinecap="round" strokeLinejoin="round"/>
  <!-- S tail — shorter, much dimmer -->
  <path d="M13.5 17 L16 26 L18.5 17"
        stroke="#D4845A" strokeWidth="2.4"
        strokeLinecap="round" strokeLinejoin="round"
        opacity="0.28"/>
  <!-- Center pivot dot -->
  <circle cx="16" cy="16" r="2.8" fill="#D4845A"/>
</svg>
