<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="7" fill="#1A1916"/>
  <!-- N — tall kite diamond: tip(16,3), widest at y=10 (±3.5), base at center(16,16) -->
  <path d="M16 3 L19.5 10 L16 16 L12.5 10 Z" fill="#D4845A"/>
  <!-- S — shorter kite, dim -->
  <path d="M16 29 L18 23 L16 16 L14 23 Z" fill="#D4845A" opacity="0.28"/>
  <!-- E — horizontal kite, dim -->
  <path d="M29 16 L23 14 L16 16 L23 18 Z" fill="#D4845A" opacity="0.28"/>
  <!-- W — horizontal kite, dim -->
  <path d="M3 16 L9 14 L16 16 L9 18 Z" fill="#D4845A" opacity="0.28"/>
  <!-- Center pivot -->
  <circle cx="16" cy="16" r="2" fill="#D4845A"/>
</svg>
